# .github/workflows/ci.yml
# GitHub Actions CI Pipeline
# Runs on every PR and push to main
# Blocks merge if any test fails

name: NYC Taxi Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PySpark transform tests
        run: |
          pytest tests/test_transforms.py -v --tb=short

      - name: Run DQ rule tests
        run: |
          pytest tests/test_dq_rules.py -v --tb=short

      - name: Run DAG integrity tests
        run: |
          pytest tests/test_dag_integrity.py -v --tb=short

      - name: Run all tests with coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  dag-validation:
    name: Validate DAG Files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Airflow
        run: |
          pip install apache-airflow==3.1.6
          pip install apache-airflow-providers-microsoft-azure==10.1.0
          pip install apache-airflow-providers-databricks==6.5.0

      - name: Validate DAG syntax
        run: |
          python -c "from airflow.models import DagBag; d = DagBag('airflow/'); assert not d.import_errors, d.import_errors"
          echo 'All DAGs valid'